# Stash | Whitelist | Loon/Surge habits + Stash-compatible providers
# Setup (see https://stash.wiki/configuration/example-config ):
# 1) Replace YOUR-AIRPORT-SUBSCRIPTION-URL with airport Clash subscription (cl=1 / clash meta, NOT Loon sub=2)
# 2) Stash -> Profiles -> import this file -> open profile -> Update All (or update airport + rule-providers)
# 3) Nodes live in proxy-provider "airport", not root proxies[] — dashboard may show proxies: 0 until provider updates
# 4) If rules fail to download: keep Stash in foreground, check cellular/Wi-Fi permission, retry Update

mixed-port: 7890
mode: rule
ipv6: false
log-level: warning
allow-lan: false
unified-delay: false
tcp-concurrent: true
keep-alive-interval: 60
find-process-mode: strict

profile:
  store-selected: true

geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  follow-rule: true
  skip-cert-verify: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - system
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    '+.jsdelivr.net': 223.5.5.5
    '+.githubusercontent.com': 223.5.5.5
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.apple.com'
    - '+.icloud.com'
    - '+.wechat.com'
    - '+.qq.com'
    - '+.wechatapp.com'
    - '+.qpic.cn'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'xbox.*.microsoft.com'
    - '+.xboxlive.com'

sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
  skip-domain:
    - '+.apple.com'
    - '+.icloud.com'
    - '+.wechat.com'
    - '+.qq.com'

proxy-providers:
  airport:
    url: 'https://YOUR-AIRPORT-SUBSCRIPTION-URL'
    path: ./providers/airport.yaml
    interval: 86400
    header:
      User-Agent: clash.meta

proxy-groups:
  - name: Manual
    type: select
    use:
      - airport
    proxies:
      - DIRECT

  - name: HK
    type: url-test
    use:
      - airport
    filter: '(?i)(港|HK|Hong|hkg)'
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 3000
    tolerance: 50
    max-failed-times: 3

  - name: TW
    type: url-test
    use:
      - airport
    filter: '(?i)(台|TW|Tai|tpe|HiNet)'
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 3000
    tolerance: 50
    max-failed-times: 3

  - name: JP
    type: url-test
    use:
      - airport
    filter: '(?i)(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|tyo)'
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 3000
    tolerance: 50
    max-failed-times: 3

  - name: KR
    type: url-test
    use:
      - airport
    filter: '(?i)(KR|Korea|KOR|首尔|韩)'
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 3000
    tolerance: 50
    max-failed-times: 3

  - name: US
    type: url-test
    use:
      - airport
    filter: '(?i)(美|US|United States|lax|LAX|na-)'
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 3000
    tolerance: 50
    max-failed-times: 3

  - name: SG
    type: url-test
    use:
      - airport
    filter: '(?i)(新加坡|坡|狮城|SG|Singapore|sin)'
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 3000
    tolerance: 50
    max-failed-times: 3

  - name: Fast
    type: url-test
    use:
      - airport
    url: http://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    timeout: 3000
    tolerance: 100
    max-failed-times: 3

  - name: Proxy
    type: select
    proxies:
      - Fast
      - HK
      - TW
      - JP
      - KR
      - US
      - SG
      - Manual
      - DIRECT

  - name: Google
    type: select
    proxies:
      - US
      - Manual

  - name: Apple
    type: select
    proxies:
      - DIRECT
      - Fast
      - US

  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - Fast
      - US

  - name: OpenAI
    type: select
    proxies:
      - US
      - JP
      - SG
      - Manual

  - name: Gemini
    type: select
    proxies:
      - SG
      - US
      - JP
      - Manual

  - name: TikTok
    type: select
    proxies:
      - Fast
      - JP
      - Manual

  - name: PayPal
    type: select
    proxies:
      - US
      - Manual

  - name: Spotify
    type: select
    proxies:
      - SG
      - Manual

  - name: YouTube
    type: select
    proxies:
      - Fast
      - Manual

  - name: Telegram
    type: select
    proxies:
      - SG
      - Manual

  - name: Netflix
    type: select
    proxies:
      - Fast
      - Manual

  - name: Disney
    type: select
    proxies:
      - Fast
      - Manual

  - name: GlobalMedia
    type: select
    proxies:
      - Fast
      - Manual

  - name: GitHub
    type: select
    proxies:
      - Fast
      - Manual

