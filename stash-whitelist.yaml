# Stash | Whitelist | Loon/Surge habits + Accademia-style DNS
# 1) Replace YOUR-AIRPORT-SUBSCRIPTION-URL below
# 2) Import this file in Stash, enable TUN
# Unmatched foreign traffic -> Proxy (whitelist)

mixed-port: 7890
mode: rule
ipv6: false
log-level: warning
allow-lan: false
unified-delay: true
tcp-concurrent: false
keep-alive-interval: 60
find-process-mode: strict

profile:
  store-selected: true

geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  follow-rule: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.apple.com'
    - '+.icloud.com'
    - '+.wechat.com'
    - '+.qq.com'
    - '+.wechatapp.com'
    - '+.qpic.cn'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'xbox.*.microsoft.com'
    - '+.xboxlive.com'

sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
  skip-domain:
    - '+.apple.com'
    - '+.icloud.com'
    - '+.wechat.com'
    - '+.qq.com'

proxy-providers:
  airport:
    type: http
    url: 'https://YOUR-AIRPORT-SUBSCRIPTION-URL'
    interval: 86400
    path: ./providers/airport.yaml
    health-check:
      enable: false

proxy-groups:
  - name: Manual
    type: select
    use:
      - airport

  - name: HK
    type: select
    use:
      - airport
    filter: '(?i)(貂ｯ|HK|Hong|hkg)'

  - name: TW
    type: select
    use:
      - airport
    filter: '(?i)(蜿ｰ|TW|Tai|tpe|HiNet)'

  - name: JP
    type: select
    use:
      - airport
    filter: '(?i)(譌･譛ｬ|蟾晄律|荳應ｺｬ|螟ｧ髦ｪ|豕画律|蝓ｼ邇榎豐ｪ譌･|豺ｱ譌･|JP|Japan|tyo)'

  - name: KR
    type: select
    use:
      - airport
    filter: '(?i)(KR|Korea|KOR|鬥門ｰ培髻ｩ)'

  - name: US
    type: select
    use:
      - airport
    filter: '(?i)(鄒旨US|United States|lax|LAX|na-)'

  - name: SG
    type: select
    use:
      - airport
    filter: '(?i)(譁ｰ蜉蝮｡|蝮｡|迢ｮ蝓旨SG|Singapore|sin)'

  - name: Available
    type: fallback
    url: http://www.apple.com/library/test/success.html
    interval: 900
    lazy: true
    timeout: 5000
    proxies:
      - JP
      - US
      - SG
      - TW
      - HK
      - KR

  - name: Proxy
    type: select
    proxies:
      - Available
      - US
      - JP
      - SG
      - TW
      - HK
      - KR
      - Manual
      - DIRECT

  - name: Apple
    type: select
    proxies:
      - DIRECT
      - Proxy
      - US
      - JP
      - SG

  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - Proxy
      - US
      - JP
      - SG

  - name: OpenAI
    type: select
    proxies:
      - US
      - JP
      - SG
      - Available
      - Manual
      - Proxy

  - name: Gemini
    type: select
    proxies:
      - SG
      - US
      - JP
      - Available
      - Manual

  - name: TikTok
    type: select
    proxies:
      - JP
      - SG
      - US
      - Available
      - Manual

  - name: PayPal
    type: select
    proxies:
      - US
      - Available
      - Manual

  - name: Spotify
    type: select
    proxies:
      - SG
      - US
      - JP
      - Available
      - Manual

  - name: YouTube
    type: select
    proxies:
      - Available
      - US
      - JP
      - SG
      - Manual

  - name: Telegram
    type: select
    proxies:
      - SG
      - JP
      - US
      - Available
      - Manual

  - name: Netflix
    type: select
    proxies:
      - Proxy
      - US
      - SG
      - JP
      - Manual

  - name: Disney
    type: select
    proxies:
      - Proxy
      - US
      - SG
      - JP
      - Manual

  - name: GlobalMedia
    type: select
    proxies:
      - Proxy
      - US
      - JP
      - SG
      - Manual

  - name: GitHub
    type: select
    proxies:
      - Proxy
      - US
      - JP
      - SG
      - Manual

