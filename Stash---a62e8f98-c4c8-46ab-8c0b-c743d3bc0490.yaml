  - RULE-SET,AdvertisingLite,REJECT
  - RULE-SET,WeChat,DIRECT
  - RULE-SET,OpenAI,AI
  - RULE-SET,PayPal,PayPal
  - RULE-SET,Telegram,Telegram
  - RULE-SET,Twitter,Social
  - RULE-SET,Facebook,Social
  - RULE-SET,TikTok,Social
  - RULE-SET,Google,Google
  - RULE-SET,GitHub,Microsoft
  - RULE-SET,Microsoft,Microsoft
  - RULE-SET,Spotify,Spotify
  - RULE-SET,GlobalMedia,Streaming
  - RULE-SET,ChinaMedia,ChinaMedia
  - RULE-SET,Apple,Apple
  - RULE-SET,Proxy,Global
  - RULE-SET,Lan,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Final
