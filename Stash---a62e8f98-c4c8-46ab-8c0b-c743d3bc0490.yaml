# Author: Merged from Repcz (structure) + daily groups aligned with QuantumultX.conf
# Base: Stash >= 2.6.0 (Clash-compatible)
# Update: 2026-07-21
#
# Lines starting with ';' '#' '//' are comments
#

mode: rule
log-level: info

dns:
  nameserver: [223.5.5.5, 119.29.29.29, 114.114.114.114]
  fake-ip-filter:
    [
      '+.lan',
      '+.local',
      '+.cmpassport.com',
      'id6.me',
      'open.e.189.cn',
      'mdn.open.wo.cn',
      'opencloud.wostore.cn',
      'auth.wosms.cn',
      '+.10099.com.cn',
      '+.msftconnecttest.com',
      '+.msftncsi.com',
      'lancache.steamcontent.com',
      '+.jegotrip.com.cn',
      '+.icitymobile.mobi',
      '+.pingan.com.cn',
    ]

subscribe-url:

proxy-providers:
  Subscribe:
    interval: 86400
    url: http://your-service-provider
    benchmark-timeout: 5
    benchmark-url: http://www.gstatic.com/generate_204

proxy-groups:

  - {name: Manual, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Quantumult_X.png, type: select, use: [Subscribe], proxies: [HongKong, United States, Singapore, Japan, Taiwan, DIRECT]}
  - {name: Global, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan]}
  - {name: Streaming, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ForeignMedia.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan]}
  - {name: ChinaMedia, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/DomesticMedia.png, type: select, proxies: [DIRECT, HongKong, Taiwan, Manual]}
  - {name: Microsoft, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan]}
  - {name: Google, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan]}
  - {name: AI, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan]}
  - {name: Social, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Twitter.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan]}
  - {name: Telegram, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan, DIRECT]}
  - {name: PayPal, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PayPal.png, type: select, proxies: [Manual, United States, HongKong, Singapore, Japan, Taiwan]}
  - {name: Spotify, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan]}
  - {name: Apple, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png, type: select, proxies: [DIRECT, HongKong, Taiwan, United States, Singapore, Japan, Manual]}
  - {name: Final, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png, type: select, proxies: [Manual, HongKong, United States, Singapore, Japan, Taiwan, DIRECT]}

  # Latency check every 1200s
  - {name: HongKong, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png, type: url-test, interval: 1200, include-all: true, filter: "(?i)🇭🇰|香港|(\\b(HK|Hong)\\b)"}
  - {name: United States, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png, type: url-test, interval: 1200, include-all: true, filter: "(?i)🇺🇸|美国|洛杉矶|圣何塞|(\\b(US|United States)\\b)"}
  - {name: Singapore, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png, type: url-test, interval: 1200, include-all: true, filter: "(?i)🇸🇬|新加坡|狮|(\\b(SG|Singapore)\\b)"}
  - {name: Japan, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png, type: url-test, interval: 1200, include-all: true, filter: "(?i)🇯🇵|日本|东京|(\\b(JP|Japan)\\b)"}
  - {name: Taiwan, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png, type: url-test, interval: 1200, include-all: true, filter: "(?i)🇨🇳|🇹🇼|台湾|(\\b(TW|Tai|Taiwan)\\b)"}

rule-providers:

  # Ads
  AdvertisingLite: {behavior: classical, interval: 86400, url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AdvertisingLite/AdvertisingLite.yaml}
  WeChat: {behavior: classical, interval: 86400, url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/WeChat/WeChat.yaml}

